<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #2D1B36, #4A2C5C);
    color: white; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 16px;
  }
  h1 { font-size: 26px; margin-bottom: 6px; }
  .hud { display: flex; gap: 28px; margin-bottom: 20px; font-size: 14px; opacity: .8; }
  .hud b { color: #FF9F0A; font-size: 18px; display: block; }
  .grid {
    display: grid; grid-template-columns: repeat(4, 70px);
    grid-template-rows: repeat(4, 70px); gap: 8px;
    perspective: 1000px;
  }
  .card { width: 70px; height: 70px; cursor: pointer; transform-style: preserve-3d; transition: transform .5s; }
  .card.flip, .card.matched { transform: rotateY(180deg); }
  .card.matched .face.back { background: rgba(50,215,75,.3); }
  .face {
    position: absolute; inset: 0; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    backface-visibility: hidden; font-size: 32px;
  }
  .face.front {
    background: linear-gradient(135deg, #FF9F0A, #FF6482);
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  .face.front::after { content: '?'; font-size: 28px; font-weight: 700; color: white; }
  .face.back { background: rgba(255,255,255,.1); transform: rotateY(180deg); }
  button.reset {
    margin-top: 24px; padding: 10px 24px; border: none; border-radius: 10px;
    background: #FF9F0A; color: #2D1B36; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .win { color: #32D74B; font-weight: 700; margin-top: 16px; min-height: 24px; }
  @media (max-width: 380px) {
    .grid { grid-template-columns: repeat(4, 60px); grid-template-rows: repeat(4, 60px); }
    .card { width: 60px; height: 60px; }
    .face { font-size: 28px; }
  }
</style>
</head>
<body>
  <h1>Memory Match</h1>
  <div class="hud">
    <div>Moves<b id="moves">0</b></div>
    <div>Pairs<b id="pairs">0/8</b></div>
  </div>
  <div class="grid" id="grid"></div>
  <p class="win" id="win"></p>
  <button class="reset" id="reset">New Game</button>
<script>
  const EMOJI = ['🍎','🍌','🍇','🍓','🍑','🍍','🥝','🥥'];
  const grid = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const winEl = document.getElementById('win');
  let first = null, lock = false, moves = 0, matched = 0;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function reset() {
    first = null; lock = false; moves = 0; matched = 0;
    movesEl.textContent = 0; pairsEl.textContent = '0/8'; winEl.textContent = '';
    grid.innerHTML = '';
    shuffle([...EMOJI, ...EMOJI]).forEach(emoji => {
      const card = document.createElement('div');
      card.className = 'card'; card.dataset.emoji = emoji;
      card.innerHTML = '<div class="face front"></div><div class="face back">'+emoji+'</div>';
      card.addEventListener('click', () => flip(card));
      grid.appendChild(card);
    });
  }
  function flip(card) {
    if (lock || card.classList.contains('flip') || card.classList.contains('matched')) return;
    card.classList.add('flip');
    if (!first) { first = card; return; }
    moves++; movesEl.textContent = moves;
    if (first.dataset.emoji === card.dataset.emoji) {
      first.classList.add('matched'); card.classList.add('matched');
      first = null; matched++;
      pairsEl.textContent = matched + '/8';
      if (matched === 8) winEl.textContent = '🎉 You won in ' + moves + ' moves!';
    } else {
      lock = true;
      const a = first, b = card;
      setTimeout(() => {
        a.classList.remove('flip'); b.classList.remove('flip');
        first = null; lock = false;
      }, 800);
    }
  }
  document.getElementById('reset').onclick = reset;
  reset();
</script>
</body>
</html>
